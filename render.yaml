services:
  - type: web
    name: teacher-api-backend
    runtime: image
    image:
      url: docker.io/library/php:8.1-cli
    buildCommand: "apt-get update && apt-get install -y unzip && curl -sS https://getcomposer.org/installer | php && mv composer.phar /usr/local/bin/composer && composer install --no-dev"
    startCommand: "php spark serve --host 0.0.0.0 --port $PORT"